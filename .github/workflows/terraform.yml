name: Terraform GitOps Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy resource from (staging | production)"
        required: true
        type: choice
        options:
          - staging
          - production
      target:
        description: "Terraform resource target (example: module.bastion.aws_instance.this)"
        required: true

jobs:

# -----------------------------
# PR → fmt / validate / plan
# -----------------------------
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (staging)
        working-directory: terraform/root
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
        run: terraform init -backend-config="../envs/staging/backend.hcl"

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform/root
        run: terraform validate

      - name: Terraform Plan (staging)
        working-directory: terraform/root
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
        run: terraform plan -var-file="../envs/staging/terraform.tfvars"


# -----------------------------
# Merge to main → Apply STAGING
# -----------------------------
  apply-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (staging)
        working-directory: terraform/root
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
        run: terraform init -backend-config="../envs/staging/backend.hcl"

      - name: Terraform Apply (staging)
        working-directory: terraform/root
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
        run: terraform apply -auto-approve -var-file="../envs/staging/terraform.tfvars"


# -----------------------------
# Tag v*.*.* → Apply PRODUCTION
# -----------------------------
  apply-production:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (production)
        working-directory: terraform/root
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        run: terraform init -backend-config="../envs/production/backend.hcl"

      - name: Terraform Apply (production)
        working-directory: terraform/root
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        run: terraform apply -auto-approve -var-file="../envs/production/terraform.tfvars"


# -----------------------------
# MANUAL DELETE (ONE ENV ONLY)
# -----------------------------
  destroy-single-resource:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Select AWS credentials
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo "AWS_ACCESS_KEY_ID=${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "BACKEND=../envs/staging/backend.hcl" >> $GITHUB_ENV
            echo "VARS=../envs/staging/terraform.tfvars" >> $GITHUB_ENV
          else
            echo "AWS_ACCESS_KEY_ID=${{ secrets.PROD_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "BACKEND=../envs/production/backend.hcl" >> $GITHUB_ENV
            echo "VARS=../envs/production/terraform.tfvars" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        working-directory: terraform/root
        run: terraform init -backend-config=$BACKEND

      - name: Terraform Destroy Target
        working-directory: terraform/root
        run: terraform destroy -auto-approve -target=${{ inputs.target }} -var-file=$VARS